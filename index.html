<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banking Decision Pulse — Skills Bank</title>
<style>
  :root{
    --brand-dark:      #080828;
    --brand-primary:   #4D88E8;
    --brand-secondary: #40BDA9;
    --brand-accent:    #FFBC3A;
    --brand-light:     #EBF4FF;
    --brand-white:     #FFFFFF;
    --brand-grey:      #8B8FA6;
    --brand-warning:   #F26A44;

    --radius-lg: 20px;
    --radius-md: 14px;
    --radius-sm: 10px;
    --shadow-soft: 0 8px 24px rgba(8,8,40,0.08);
    --shadow-lift: 0 14px 34px rgba(8,8,40,0.14);
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; padding:0;
    min-height:100%;
    background:
      radial-gradient(1200px 600px at 50% -10%, var(--brand-light) 0%, var(--brand-white) 55%);
    color:var(--brand-dark);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  button{ font-family:inherit; }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important; }
  }

  .app-shell{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px 16px 40px;
  }

  .card{
    width:100%;
    max-width:520px;
    background:var(--brand-white);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow-lift);
    overflow:hidden;
    border:1px solid rgba(8,8,40,0.06);
  }

  /* ---------- Header ---------- */
  .app-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:16px 20px;
    background:var(--brand-dark);
  }
  .logo-wrap{ display:flex; align-items:center; }
  .logo-wrap svg{ height:28px; width:auto; display:block; }
  .header-kicker{
    color:var(--brand-light);
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    font-weight:600;
    opacity:0.75;
    text-align:right;
  }

  /* ---------- Progress ---------- */
  .progress-wrap{
    padding:14px 20px 0;
  }
  .progress-label{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    font-weight:600;
    color:var(--brand-grey);
    margin-bottom:8px;
    letter-spacing:0.02em;
  }
  .progress-track{
    height:6px;
    border-radius:999px;
    background:var(--brand-light);
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    border-radius:999px;
    background:linear-gradient(90deg, var(--brand-primary), var(--brand-secondary));
    transition:width 0.35s ease;
    width:0%;
  }

  .score-pill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-size:12px;
    font-weight:700;
    color:var(--brand-primary);
    background:var(--brand-light);
    padding:5px 12px;
    border-radius:999px;
    margin-top:10px;
  }

  /* ---------- Screen body ---------- */
  .screen{
    display:none;
    padding:22px 22px 26px;
    animation:fadeIn 0.28s ease;
  }
  .screen.active{ display:block; }

  @keyframes fadeIn{
    from{ opacity:0; transform:translateY(6px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .eyebrow{
    font-size:12px;
    font-weight:700;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--brand-secondary);
    margin:0 0 6px;
  }

  h1.screen-title{
    font-size:22px;
    line-height:1.25;
    margin:0 0 6px;
    color:var(--brand-dark);
    font-weight:800;
  }

  .subtitle{
    font-size:15px;
    color:var(--brand-primary);
    font-weight:600;
    margin:0 0 14px;
  }

  p{ font-size:15px; line-height:1.6; color:#3B3B58; margin:0 0 12px; }

  .lede{
    font-size:16px;
    color:var(--brand-dark);
    font-weight:600;
    margin-bottom:6px;
  }

  /* ---------- Welcome screen ---------- */
  .welcome-mark{
    display:flex;
    justify-content:center;
    margin-bottom:22px;
  }
  .welcome-mark svg{ height:34px; width:auto; }

  .training-kicker{
    text-align:center;
    font-size:11px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    font-weight:700;
    color:var(--brand-grey);
    margin-bottom:10px;
  }

  .welcome-body{ text-align:center; }
  .welcome-body h1{
    font-size:26px;
    margin:0 0 8px;
    color:var(--brand-dark);
    font-weight:800;
  }
  .welcome-body .subtitle{ text-align:center; }
  .welcome-body p{ text-align:left; }

  /* ---------- Case card ---------- */
  .case-card{
    background:var(--brand-light);
    border-left:4px solid var(--brand-primary);
    border-radius:var(--radius-md);
    padding:16px 18px;
    margin:14px 0;
  }
  .case-card p{ color:var(--brand-dark); margin-bottom:0; }

  .note-strip{
    display:flex;
    gap:10px;
    align-items:flex-start;
    background:#FFF6E6;
    border-radius:var(--radius-sm);
    padding:12px 14px;
    margin-top:14px;
  }
  .note-strip .dot{
    flex:0 0 auto;
    width:8px; height:8px; border-radius:50%;
    background:var(--brand-accent);
    margin-top:6px;
  }
  .note-strip p{ margin:0; font-size:13.5px; color:var(--brand-dark); font-weight:600; }

  /* ---------- Options ---------- */
  .options{ display:flex; flex-direction:column; gap:10px; margin-top:16px; }

  .option-btn{
    text-align:left;
    width:100%;
    background:var(--brand-white);
    border:2px solid var(--brand-light);
    border-radius:var(--radius-md);
    padding:14px 16px;
    font-size:14.5px;
    line-height:1.5;
    color:var(--brand-dark);
    cursor:pointer;
    display:flex;
    gap:12px;
    align-items:flex-start;
    transition:border-color 0.15s ease, background 0.15s ease, transform 0.1s ease;
  }
  .option-btn:hover:not(:disabled){
    border-color:var(--brand-primary);
    background:var(--brand-light);
  }
  .option-btn:active:not(:disabled){ transform:scale(0.99); }
  .option-btn:focus-visible{
    outline:3px solid var(--brand-primary);
    outline-offset:2px;
  }
  .option-btn:disabled{ cursor:default; }

  .option-letter{
    flex:0 0 auto;
    width:26px; height:26px;
    border-radius:50%;
    background:var(--brand-light);
    color:var(--brand-primary);
    font-weight:800;
    font-size:12.5px;
    display:flex; align-items:center; justify-content:center;
  }

  .option-btn.correct{
    border-color:var(--brand-secondary);
    background:rgba(64,189,169,0.10);
  }
  .option-btn.correct .option-letter{
    background:var(--brand-secondary);
    color:var(--brand-white);
  }
  .option-btn.incorrect{
    border-color:var(--brand-warning);
    background:rgba(242,106,68,0.08);
  }
  .option-btn.incorrect .option-letter{
    background:var(--brand-warning);
    color:var(--brand-white);
  }
  .option-btn.dimmed{ opacity:0.55; }

  /* ---------- Feedback ---------- */
  .feedback{
    display:none;
    margin-top:16px;
    padding:14px 16px;
    border-radius:var(--radius-md);
    animation:fadeIn 0.25s ease;
  }
  .feedback.show{ display:block; }
  .feedback.good{ background:rgba(64,189,169,0.12); border:1px solid var(--brand-secondary); }
  .feedback.bad{ background:rgba(242,106,68,0.10); border:1px solid var(--brand-warning); }
  .feedback-title{ font-weight:800; font-size:14.5px; margin-bottom:4px; }
  .feedback.good .feedback-title{ color:#1F7A6B; }
  .feedback.bad .feedback-title{ color:#B24A2E; }
  .feedback p{ margin:0; font-size:14px; color:var(--brand-dark); }

  /* ---------- Buttons ---------- */
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:100%;
    padding:15px 20px;
    border-radius:999px;
    border:none;
    font-size:15.5px;
    font-weight:700;
    cursor:pointer;
    transition:transform 0.12s ease, box-shadow 0.15s ease, background 0.15s ease;
  }
  .btn:focus-visible{ outline:3px solid var(--brand-dark); outline-offset:3px; }
  .btn-primary{
    background:var(--brand-primary);
    color:var(--brand-white);
    box-shadow:0 10px 22px rgba(77,136,232,0.30);
    margin-top:18px;
  }
  .btn-primary:hover{ background:#3E77D6; transform:translateY(-1px); }
  .btn-primary:active{ transform:translateY(0); }
  .btn-primary:disabled{
    opacity:0.45; cursor:not-allowed; box-shadow:none; transform:none;
  }
  .btn-secondary{
    background:var(--brand-white);
    color:var(--brand-primary);
    border:2px solid var(--brand-primary);
    margin-top:10px;
  }
  .btn-secondary:hover{ background:var(--brand-light); }

  /* ---------- Final screen ---------- */
  .final-mark{ display:flex; justify-content:center; margin-bottom:16px; }
  .final-mark svg{ height:30px; width:auto; }

  .score-hero{
    text-align:center;
    background:linear-gradient(135deg, var(--brand-dark), #14144A);
    border-radius:var(--radius-md);
    padding:22px 18px;
    color:var(--brand-white);
    margin-bottom:16px;
  }
  .score-hero .score-num{ font-size:38px; font-weight:800; letter-spacing:-0.02em; }
  .score-hero .score-den{ font-size:16px; opacity:0.7; font-weight:600; }
  .score-hero .score-msg{ font-size:13.5px; margin-top:8px; opacity:0.9; }

  .insight-line{
    text-align:center;
    font-size:15.5px;
    font-weight:700;
    color:var(--brand-dark);
    background:var(--brand-light);
    border-radius:var(--radius-md);
    padding:14px 16px;
    margin-bottom:18px;
  }

  .summary-block{
    border:1px solid var(--brand-light);
    border-radius:var(--radius-md);
    padding:4px 16px;
    margin-bottom:18px;
  }
  .summary-row{
    padding:12px 0;
    border-bottom:1px solid var(--brand-light);
  }
  .summary-row:last-child{ border-bottom:none; }
  .summary-row .summary-label{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    font-weight:700;
    color:var(--brand-grey);
    margin-bottom:4px;
  }
  .summary-row .summary-value{ font-size:14.5px; color:var(--brand-dark); font-weight:600; line-height:1.5; }

  .takeaways{ list-style:none; margin:0 0 18px; padding:0; display:flex; flex-direction:column; gap:10px; }
  .takeaways li{
    display:flex; gap:10px; align-items:flex-start;
    font-size:14.5px; color:var(--brand-dark); font-weight:600;
    background:var(--brand-white);
    border:1px solid var(--brand-light);
    border-radius:var(--radius-sm);
    padding:10px 12px;
  }
  .takeaways .num{
    flex:0 0 auto;
    width:22px; height:22px; border-radius:50%;
    background:var(--brand-secondary);
    color:var(--brand-white);
    font-size:12px; font-weight:800;
    display:flex; align-items:center; justify-content:center;
  }

  .debrief{
    background:#FFF6E6;
    border-radius:var(--radius-md);
    padding:14px 16px;
    margin-bottom:6px;
  }
  .debrief .debrief-label{
    font-size:11px; text-transform:uppercase; letter-spacing:0.06em;
    font-weight:700; color:#8A6512; margin-bottom:4px;
  }
  .debrief p{ margin:0; font-weight:700; color:var(--brand-dark); font-size:14.5px; }

  .final-actions{ display:flex; flex-direction:column; gap:0; margin-top:6px; }

  @media (min-width:480px){
    .app-header .header-kicker{ font-size:12px; }
    .logo-wrap svg{ height:32px; }
    .welcome-mark svg{ height:36px; }
    .final-mark svg{ height:34px; }
  }
</style>
</head>
<body>

<div class="app-shell">
  <div class="card">

    <!-- ===== Persistent header (hidden on welcome + final) ===== -->
    <header class="app-header" id="appHeader" style="display:none;">
      <div class="logo-wrap" role="img" aria-label="Skills Bank Logo" id="headerLogo"></div>
      <div class="header-kicker">Build Your<br>Decision-Making Muscles</div>
    </header>

    <div class="progress-wrap" id="progressWrap" style="display:none;">
      <div class="progress-label">
        <span id="progressStepLabel">Step 1 of 4</span>
        <span class="score-pill" id="scorePill" style="display:none;">Score: 0/3</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <!-- ===== SCREEN 1 — Welcome ===== -->
    <section class="screen active" id="screen-welcome">
      <div class="welcome-mark" role="img" aria-label="Skills Bank Logo" id="welcomeLogo"></div>
      <div class="training-kicker" id="trainingKickerText"></div>
      <div class="welcome-body">
        <h1 id="activityTitleText"></h1>
        <p class="subtitle" id="welcomeSubtitleText"></p>
        <p id="welcomeBodyText"></p>
      </div>
      <button class="btn btn-primary" id="btnStart">Start Decision Pulse</button>
    </section>

    <!-- ===== SCREEN 2 — Read the case ===== -->
    <section class="screen" id="screen-case">
      <p class="eyebrow">Case study</p>
      <h1 class="screen-title" id="caseTitleText"></h1>
      <p id="caseInstructionText"></p>
      <div class="case-card"><p id="caseText"></p></div>
      <div class="note-strip">
        <span class="dot"></span>
        <p id="caseNoteText"></p>
      </div>
      <button class="btn btn-primary" id="btnToScreen3">Analyze the Problem</button>
    </section>

    <!-- ===== SCREEN 3 — Visible symptom ===== -->
    <section class="screen" id="screen-symptom">
      <p class="eyebrow" id="q1EyebrowText"></p>
      <h1 class="screen-title" id="q1QuestionText"></h1>
      <div class="options" id="q1Options"></div>
      <div class="feedback" id="q1Feedback">
        <div class="feedback-title" id="q1FeedbackTitle"></div>
        <p id="q1FeedbackExplanation"></p>
      </div>
      <button class="btn btn-primary" id="q1Next" style="display:none;">Next</button>
    </section>

    <!-- ===== SCREEN 4 — Real problem ===== -->
    <section class="screen" id="screen-real-problem">
      <p class="eyebrow" id="q2EyebrowText"></p>
      <h1 class="screen-title" id="q2QuestionText"></h1>
      <div class="options" id="q2Options"></div>
      <div class="feedback" id="q2Feedback">
        <div class="feedback-title" id="q2FeedbackTitle"></div>
        <p id="q2FeedbackExplanation"></p>
      </div>
      <button class="btn btn-primary" id="q2Next" style="display:none;">Choose the Decision</button>
    </section>

    <!-- ===== SCREEN 5 — Best decision ===== -->
    <section class="screen" id="screen-decision">
      <p class="eyebrow" id="q3EyebrowText"></p>
      <h1 class="screen-title" id="q3QuestionText"></h1>
      <div class="options" id="q3Options"></div>
      <div class="feedback" id="q3Feedback">
        <div class="feedback-title" id="q3FeedbackTitle"></div>
        <p id="q3FeedbackExplanation"></p>
      </div>
      <button class="btn btn-primary" id="q3Next" style="display:none;">See Decision Insight</button>
    </section>

    <!-- ===== SCREEN 6 — Final insight ===== -->
    <section class="screen" id="screen-final">
      <div class="final-mark" role="img" aria-label="Skills Bank Logo" id="finalLogo"></div>
      <h1 class="screen-title" style="text-align:center;" id="finalTitleText"></h1>

      <div class="score-hero">
        <div><span class="score-num" id="finalScoreNum">0</span><span class="score-den"> / 3</span></div>
        <div class="score-msg" id="finalScoreMsg"></div>
      </div>

      <div class="insight-line" id="finalInsightText"></div>

      <div class="summary-block">
        <div class="summary-row">
          <div class="summary-label">Visible symptom</div>
          <div class="summary-value" id="summarySymptom"></div>
        </div>
        <div class="summary-row">
          <div class="summary-label">Real problem</div>
          <div class="summary-value" id="summaryProblem"></div>
        </div>
        <div class="summary-row">
          <div class="summary-label">Best action</div>
          <div class="summary-value" id="summaryAction"></div>
        </div>
      </div>

      <ul class="takeaways" id="takeawaysList"></ul>

      <div class="debrief">
        <div class="debrief-label">Trainer debrief prompt</div>
        <p id="debriefPromptText"></p>
      </div>

      <div class="final-actions">
        <button class="btn btn-primary" id="btnRestart">Restart Activity</button>
      </div>
    </section>

  </div>
</div>

  var activityInfo = {
    trainingTitle: "Build Your Decision-Making Muscles",
    activityTitle: "Activity 1: Banking Decision Pulse",
    briefing: "Read the case study and identify how you will collect the data using the learned tools.",
    welcomeSubtitle: "Analyze the problem. Choose the best decision.",
    welcomeBody: "A good decision starts with understanding the real problem. Read the case carefully. Look beyond the visible symptom. Then choose the action that solves the real issue.",
    finalTitle: "Your Decision Pulse",
    finalInsight: "Good decisions solve the real problem, not only the visible symptom.",
    debriefPrompt: "What data would you collect before making the decision?"
  };

  var caseStudy = {
    title: "Step 1 — Read the case",
    instruction: "Read the customer case carefully.",
    text: "A first-time customer opened a bank account online, but the mobile app still shows \u201CProfile pending verification.\u201D The branch tells the customer to call the hotline, and the hotline tells the customer to visit the branch. The customer is frustrated and says: \u201CI don\u2019t know who is responsible. I\u2019m starting to regret opening the account.\u201D",
    note: "Do not rush to the solution. First, understand the problem."
  };

  var diagnosisQuestions = [
    {
      step: "Step 2 — Spot the visible symptom",
      question: "What is the visible symptom in this case?",
      buttonLabel: "Next",
      feedbackCorrectTitle: "Good diagnosis.",
      feedbackIncorrectTitle: "Close, but not the visible symptom.",
      explanation: "The visible symptom is the pending verification message. The other issues are signs of a deeper problem.",
      options: [
        { text: "The app still shows \u201CProfile pending verification.\u201D", correct: true },
        { text: "The customer is unsure which channel to contact.", correct: false },
        { text: "The customer may stop using online banking.", correct: false }
      ]
    },
    {
      step: "Step 3 — Find the real problem",
      question: "What is the real problem behind the case?",
      buttonLabel: "Choose the Decision",
      feedbackCorrectTitle: "Strong problem reading.",
      feedbackIncorrectTitle: "Close, but this does not solve the real issue.",
      explanation: "The deeper problem is ownership and clarity. The customer is being moved between channels without one clear owner.",
      options: [
        { text: "No one owns the case or gives a clear next step.", correct: true },
        { text: "The app needs more time before the profile updates.", correct: false },
        { text: "The customer needs a different digital service channel.", correct: false }
      ]
    }
  ];

  var decisionQuestion = {
    step: "Step 4 — Choose the best decision",
    question: "What is the best decision?",
    buttonLabel: "See Decision Insight",
    feedbackCorrectTitle: "Strong decision.",
    feedbackIncorrectTitle: "Close, but this does not solve the real problem.",
    options: [
      { letter: "A", text: "Set a clear 48-hour wait and explain verification timing.", correct: false, feedback: "A only asks the customer to wait." },
      { letter: "B", text: "Book a branch visit and confirm the required documents.", correct: false, feedback: "B sends the customer back into the same loop." },
      { letter: "C", text: "Assign one owner, check verification, and update the customer.", correct: true, feedback: "Answer C is the strongest decision because it gives ownership, checks the missing step, and gives the customer a clear update." },
      { letter: "D", text: "Offer another digital option that may fit the customer better.", correct: false, feedback: "D changes the product instead of solving the current problem." }
    ]
  };

  var finalSummary = {
    symptom: "Profile pending verification.",
    problem: "No clear ownership and no clear next step.",
    action: "Assign one owner, check the missing verification step, and update the customer."
  };

  var finalTakeaways = [
    "Do not stop at the symptom.",
    "Find the real problem.",
    "Choose an action with ownership and clarity."
  ];

  /* =========================================================
     STATE
     ========================================================= */
  var state = {
    score: 0,
    q1Answered: false,
    q2Answered: false,
    q3Answered: false
  };

  /* =========================================================
     HELPERS
     ========================================================= */
  function $(id){ return document.getElementById(id); }

  function shuffle(arr){
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function showScreen(id){
    var screens = document.querySelectorAll(".screen");
    for (var i = 0; i < screens.length; i++) { screens[i].classList.remove("active"); }
    $(id).classList.add("active");

    var isWelcomeOrFinal = (id === "screen-welcome" || id === "screen-final");
    $("appHeader").style.display = isWelcomeOrFinal ? "none" : "flex";
    $("progressWrap").style.display = isWelcomeOrFinal ? "none" : "block";

    window.scrollTo({ top: 0, behavior: "auto" });
  }

  function setProgress(percent, label, showScore){
    $("progressFill").style.width = percent + "%";
    $("progressStepLabel").textContent = label;
    if (showScore) {
      $("scorePill").style.display = "inline-flex";
      $("scorePill").textContent = "Score: " + state.score + "/3";
    } else {
      $("scorePill").style.display = "none";
    }
  }

  /* =========================================================
     RENDER STATIC TEXT + LOGOS
     ========================================================= */
  function renderStaticContent(){
    $("headerLogo").innerHTML = SKILLS_BANK_LOGO_SVG;
    $("welcomeLogo").innerHTML = SKILLS_BANK_LOGO_SVG;
    $("finalLogo").innerHTML = SKILLS_BANK_LOGO_SVG;

    $("trainingKickerText").textContent = activityInfo.trainingTitle;
    $("activityTitleText").textContent = "Banking Decision Pulse";
    $("welcomeSubtitleText").textContent = activityInfo.welcomeSubtitle;
    $("welcomeBodyText").textContent = activityInfo.welcomeBody;

    $("caseTitleText").textContent = caseStudy.title;
    $("caseInstructionText").textContent = caseStudy.instruction;
    $("caseText").textContent = caseStudy.text;
    $("caseNoteText").textContent = caseStudy.note;

    $("finalTitleText").textContent = activityInfo.finalTitle;
    $("finalInsightText").textContent = activityInfo.finalInsight;
    $("summarySymptom").textContent = finalSummary.symptom;
    $("summaryProblem").textContent = finalSummary.problem;
    $("summaryAction").textContent = finalSummary.action;
    $("debriefPromptText").textContent = activityInfo.debriefPrompt;

    var list = $("takeawaysList");
    list.innerHTML = "";
    finalTakeaways.forEach(function(t, idx){
      var li = document.createElement("li");
      var num = document.createElement("span");
      num.className = "num";
      num.textContent = String(idx + 1);
      var span = document.createElement("span");
      span.textContent = t;
      li.appendChild(num);
      li.appendChild(span);
      list.appendChild(li);
    });
  }

  /* =========================================================
     SCREEN 3 & 4 — DIAGNOSIS QUESTIONS (shuffled options)
     ========================================================= */
  function renderDiagnosisQuestion(qIndex, prefix, nextHandler){
    var q = diagnosisQuestions[qIndex];
    $(prefix + "EyebrowText").textContent = q.step;
    $(prefix + "QuestionText").textContent = q.question;

    var optionsWrap = $(prefix + "Options");
    optionsWrap.innerHTML = "";
    var shuffled = shuffle(q.options);
    var letters = ["A", "B", "C"];

    shuffled.forEach(function(opt, i){
      var btn = document.createElement("button");
      btn.className = "option-btn";
      btn.setAttribute("type", "button");

      var letterSpan = document.createElement("span");
      letterSpan.className = "option-letter";
      letterSpan.textContent = letters[i];

      var textSpan = document.createElement("span");
      textSpan.textContent = opt.text;

      btn.appendChild(letterSpan);
      btn.appendChild(textSpan);

      btn.addEventListener("click", function(){
        handleDiagnosisAnswer(prefix, q, opt, btn, optionsWrap, nextHandler);
      });

      optionsWrap.appendChild(btn);
    });

    $(prefix + "Feedback").classList.remove("show", "good", "bad");
    $(prefix + "Next").style.display = "none";
    $(prefix + "Next").textContent = q.buttonLabel;
  }

  function handleDiagnosisAnswer(prefix, q, chosenOpt, chosenBtn, optionsWrap, nextHandler){
    var alreadyAnswered = (prefix === "q1" && state.q1Answered) || (prefix === "q2" && state.q2Answered);
    if (alreadyAnswered) return;

    if (prefix === "q1") { state.q1Answered = true; }
    if (prefix === "q2") { state.q2Answered = true; }

    var allBtns = optionsWrap.querySelectorAll(".option-btn");
    allBtns.forEach(function(b){ b.disabled = true; });

    if (chosenOpt.correct) {
      chosenBtn.classList.add("correct");
      state.score += 1;
    } else {
      chosenBtn.classList.add("incorrect");
      allBtns.forEach(function(b){
        if (b !== chosenBtn) { b.classList.add("dimmed"); }
      });
    }

    // Always reveal the correct answer
    var correctText = null;
    for (var k = 0; k < q.options.length; k++){
      if (q.options[k].correct) { correctText = q.options[k].text; }
    }
    allBtns.forEach(function(b){
      var span = b.querySelectorAll("span")[1];
      if (span && span.textContent === correctText) {
        b.classList.add("correct");
        b.classList.remove("dimmed");
      }
    });

    var fb = $(prefix + "Feedback");
    fb.classList.add("show");
    if (chosenOpt.correct) {
      fb.classList.add("good");
      $(prefix + "FeedbackTitle").textContent = q.feedbackCorrectTitle;
    } else {
      fb.classList.add("bad");
      $(prefix + "FeedbackTitle").textContent = q.feedbackIncorrectTitle;
    }
    $(prefix + "FeedbackExplanation").textContent = q.explanation;

    $(prefix + "Next").style.display = "inline-flex";
    updateScorePillsIfVisible();
  }

  function updateScorePillsIfVisible(){
    if ($("scorePill").style.display !== "none") {
      $("scorePill").textContent = "Score: " + state.score + "/3";
    }
  }

  /* =========================================================
     SCREEN 5 — DECISION QUESTION (fixed order, letters A-D)
     ========================================================= */
  function renderDecisionQuestion(){
    var q = decisionQuestion;
    $("q3EyebrowText").textContent = q.step;
    $("q3QuestionText").textContent = q.question;

    var optionsWrap = $("q3Options");
    optionsWrap.innerHTML = "";

    q.options.forEach(function(opt){
      var btn = document.createElement("button");
      btn.className = "option-btn";
      btn.setAttribute("type", "button");

      var letterSpan = document.createElement("span");
      letterSpan.className = "option-letter";
      letterSpan.textContent = opt.letter;

      var textSpan = document.createElement("span");
      textSpan.textContent = opt.text;

      btn.appendChild(letterSpan);
      btn.appendChild(textSpan);

      btn.addEventListener("click", function(){
        handleDecisionAnswer(opt, btn, optionsWrap);
      });

      optionsWrap.appendChild(btn);
    });

    $("q3Feedback").classList.remove("show", "good", "bad");
    $("q3Next").style.display = "none";
    $("q3Next").textContent = q.buttonLabel;
  }

  function handleDecisionAnswer(chosenOpt, chosenBtn, optionsWrap){
    if (state.q3Answered) return;
    state.q3Answered = true;

    var allBtns = optionsWrap.querySelectorAll(".option-btn");
    allBtns.forEach(function(b){ b.disabled = true; });

    if (chosenOpt.correct) {
      chosenBtn.classList.add("correct");
      state.score += 1;
    } else {
      chosenBtn.classList.add("incorrect");
      allBtns.forEach(function(b){
        if (b !== chosenBtn) { b.classList.add("dimmed"); }
      });
    }

    // Always reveal the correct answer (C)
    decisionQuestion.options.forEach(function(opt, idx){
      if (opt.correct) {
        var btn = allBtns[idx];
        btn.classList.add("correct");
        btn.classList.remove("dimmed");
      }
    });

    var fb = $("q3Feedback");
    fb.classList.add("show");
    if (chosenOpt.correct) {
      fb.classList.add("good");
      $("q3FeedbackTitle").textContent = decisionQuestion.feedbackCorrectTitle;
    } else {
      fb.classList.add("bad");
      $("q3FeedbackTitle").textContent = decisionQuestion.feedbackIncorrectTitle;
    }
    $("q3FeedbackExplanation").textContent = chosenOpt.correct ? chosenOpt.feedback : chosenOpt.feedback;

    $("q3Next").style.display = "inline-flex";
    updateScorePillsIfVisible();
  }

  /* =========================================================
     FINAL SCREEN
     ========================================================= */
  function renderFinalScreen(){
    $("finalScoreNum").textContent = String(state.score);
    var msg;
    if (state.score === 3) {
      msg = "Excellent. You diagnosed the problem and chose a strong decision.";
    } else if (state.score === 2) {
      msg = "Good work. You are building your decision-making muscle.";
    } else {
      msg = "Keep practicing. Strong decisions start with clear problem analysis.";
    }
    $("finalScoreMsg").textContent = msg;
  }

  /* =========================================================
     RESET / RESTART
     ========================================================= */
  function resetActivity(){
    state.score = 0;
    state.q1Answered = false;
    state.q2Answered = false;
    state.q3Answered = false;
    showScreen("screen-welcome");
  }

  /* =========================================================
     NAVIGATION WIRING
     ========================================================= */
  $("btnStart").addEventListener("click", function(){
    showScreen("screen-case");
  });

  $("btnToScreen3").addEventListener("click", function(){
    renderDiagnosisQuestion(0, "q1", null);
    setProgress(50, "Step 2 of 4", true);
    updateScorePillsIfVisible();
    showScreen("screen-symptom");
  });

  $("q1Next").addEventListener("click", function(){
    renderDiagnosisQuestion(1, "q2", null);
    setProgress(75, "Step 3 of 4", true);
    showScreen("screen-real-problem");
  });

  $("q2Next").addEventListener("click", function(){
    renderDecisionQuestion();
    setProgress(100, "Step 4 of 4", true);
    showScreen("screen-decision");
  });

  $("q3Next").addEventListener("click", function(){
    setProgress(100, "Insight", true);
    renderFinalScreen();
    showScreen("screen-final");
  });

  $("btnRestart").addEventListener("click", resetActivity);

  /* =========================================================
     INIT
     ========================================================= */
  renderStaticContent();
  setProgress(25, "Step 1 of 4", false);
  showScreen("screen-welcome");

})();
</script>
